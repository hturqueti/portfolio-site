<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hello World</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: #0f172a;
            color: #e2e8f0;
        }

        .card {
            padding: 32px;
            border-radius: 16px;
            background: #111827;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
            text-align: center;
            max-width: 700px;
        }

        h1 {
            margin-top: 0;
        }

        p {
            line-height: 1.6;
        }

        code {
            background: #1f2937;
            padding: 2px 6px;
            border-radius: 6px;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>Hello World</h1>
        <p>Minha primeira página publicada com GitHub + Cloudflare Pages.</p>
        <p>Se você está vendo isso, o deploy funcionou.</p>
    </div>
</body>
